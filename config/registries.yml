registries:
  python:
    - id: pypi
      label: PyPI
      domains: [pypi.org]
      endpoints:
        web: "https://pypi.org/project/{name}/"
        api: "https://pypi.org/pypi/{name}/json"
    - id: pypa
      label: PyPA
      domains: [pypa.io]
      endpoints:
        web: "https://pypa.io/"

  node:
    - id: npm
      label: npm
      domains: [npmjs.com, registry.npmjs.org]
      endpoints:
        web: "https://www.npmjs.com/package/{name}"
        api: "https://registry.npmjs.org/{name}"
    - id: yarn
      label: Yarn
      domains: [yarnpkg.com]
      endpoints:
        web: "https://yarnpkg.com/package/{name}"

  java:
    - id: maven
      label: Maven Central
      domains: [search.maven.org]
      endpoints:
        web: "https://search.maven.org/artifact/{group}/{artifact}"
    - id: gradle
      label: Gradle
      domains: [gradle.org]
      endpoints:
        web: "https://gradle.org/"
    - id: jcenter
      label: JCenter (deprecated)
      domains: [jcenter.bintray.com]
      endpoints:
        web: "https://jcenter.bintray.com/"

  go:
    - id: pkggo
      label: pkg.go.dev
      domains: [pkg.go.dev]
      endpoints:
        web: "https://pkg.go.dev/{module}"
    - id: goproxy
      label: Go Proxy
      domains: [proxy.golang.org, goproxy.io]
      endpoints:
        api: "https://proxy.golang.org/{module}/@v/list"

  rust:
    - id: crates
      label: crates.io
      domains: [crates.io]
      endpoints:
        web: "https://crates.io/crates/{name}"
        api: "https://crates.io/api/v1/crates/{name}"

  ruby:
    - id: rubygems
      label: RubyGems
      domains: [rubygems.org]
      endpoints:
        web: "https://rubygems.org/gems/{name}"
        api: "https://rubygems.org/api/v1/gems/{name}.json"

  php:
    - id: packagist
      label: Packagist
      domains: [packagist.org, repo.packagist.org]
      endpoints:
        web: "https://packagist.org/packages/{vendor}/{package}"
        api: "https://repo.packagist.org/p/{vendor}/{package}.json"

  dotnet:
    - id: nuget
      label: NuGet
      domains: [nuget.org, api.nuget.org]
      endpoints:
        web: "https://www.nuget.org/packages/{name}"
        api: "https://api.nuget.org/v3/registration5-gz-semver2/{name}/index.json"
