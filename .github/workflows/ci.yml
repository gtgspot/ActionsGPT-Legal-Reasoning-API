name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPECT_API_KEY: ${{ secrets.EXPECT_API_KEY || 'test-key' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools and deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy pytest
          # Minimal runtime deps for imports/tests
          pip install fastapi httpx pydantic beautifulsoup4

      - name: Ruff
        run: ruff check .

      - name: Black (check)
        run: black --check .

      - name: Mypy
        run: mypy .

      - name: Tests
        run: pytest -q
