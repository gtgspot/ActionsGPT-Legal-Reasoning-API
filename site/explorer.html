<!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ActionsGPT — Legal Reasoning API — Explorer</title>
        <link rel="stylesheet" href="assets/styles.css" />
        <script defer src="assets/config.js"></script>
        <script defer src="assets/app.js"></script>
        <script type="module" src="assets/analytics.js"></script>
      </head>
      <body>
        <div class="layout">
          <header class="header">
            <div class="brand"><a href="./">ActionsGPT — Legal Reasoning API</a></div>
            <nav class="btns">
              <a class="btn" href="api.html">API Docs</a>
              <a class="btn primary" href="explorer.html">Explorer</a>
              <a class="btn" href="map.html">Citations Map</a>
            </nav>
          </header>
          <section class="container" style="padding:18px">
            <div class="grid" style="grid-template-columns: 1fr; gap: 16px;">
              <div class="card">
                <h3>Legal Sources Explorer</h3>
                <form id="explorer-form">
                  <input id="explorer-input" class="input" placeholder="Search e.g. Evidence Act s 138" />
                </form>
                <div id="explorer-out" style="margin-top: 10px;"></div>
              </div>
              <div class="card">
                <h3>Package Registries</h3>
                <form id="registries-form" class="grid" style="grid-template-columns: 1fr 1fr; gap:10px;">
                  <select id="registries-lang" class="input">
                    <option value="python">Python (PyPI)</option>
                    <option value="node">Node (npm/Yarn)</option>
                    <option value="java">Java (Maven)</option>
                    <option value="go">Go (pkg.go.dev)</option>
                    <option value="rust">Rust (crates.io)</option>
                    <option value="ruby">Ruby (RubyGems)</option>
                    <option value="php">PHP (Packagist)</option>
                    <option value="dotnet">.NET (NuGet)</option>
                  </select>
                  <input id="registries-name" class="input" placeholder="package (or vendor/name)" />
                  <input id="registries-group" class="input" placeholder="maven group (optional)" />
                  <input id="registries-artifact" class="input" placeholder="maven artifact (optional)" />
                  <label><input id="registries-fetch" type="checkbox" /> include fetch</label>
                  <button class="btn primary" type="submit">Resolve</button>
                </form>
                <div id="registries-out" class="list" style="margin-top:10px"></div>
              </div>
            </div>
          </section>
        </div>
      </body>
    </html>
